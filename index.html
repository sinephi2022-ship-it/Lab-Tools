<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:;">
    <title>LabMate Pro</title>
    
    <!-- CDN资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- 核心库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.prod.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-auth-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-firestore-compat.min.js"></script>
    <script src="config.js"></script>
    
    <style>
        [v-cloak] { display: none; }
        #loading-screen { position: fixed; inset: 0; background: linear-gradient(135deg, #2563eb, #1e3a8a); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        #loading-screen > div { text-align: center; color: white; }
    </style>
</head>
<body class="overflow-hidden bg-gray-50">
    <div id="loading-screen">
        <div>
            <div class="w-12 h-12 border-4 border-white border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-xl font-bold">LabMate Pro</p>
            <p class="text-sm text-blue-100 mt-2">Initializing...</p>
        </div>
    </div>
    
    <div id="app" v-cloak class="w-full h-screen flex flex-col">
        <!-- 认证视图 -->
        <div v-if="view === 'auth'" class="h-full flex items-center justify-center bg-gray-50 px-4">
            <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
                <h1 class="text-3xl font-bold text-center mb-4">LabMate</h1>
                <form @submit.prevent="handleAuth" class="space-y-3">
                    <input v-model="form.name" v-if="view==='signup'" type="text" placeholder="Name" class="w-full p-2 border rounded-lg">
                    <input v-model="form.email" type="email" placeholder="Email" class="w-full p-2 border rounded-lg">
                    <input v-model="form.password" type="password" placeholder="Password" class="w-full p-2 border rounded-lg">
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold">{{ view==='auth' ? 'Login' : 'Sign Up' }}</button>
                </form>
                <button @click="handleGoogleLogin" class="w-full mt-3 bg-white border border-gray-300 py-2 rounded-lg font-bold">Google Login</button>
            </div>
        </div>
        
        <!-- 大厅视图 -->
        <div v-else-if="view === 'lobby'" class="h-full flex flex-col">
            <div class="bg-white px-6 py-4 border-b flex justify-between items-center">
                <h1 class="text-2xl font-bold">LabMate</h1>
                <button @click="logout" class="px-4 py-2 bg-red-500 text-white rounded-lg">Logout</button>
            </div>
            <div class="flex-1 overflow-y-auto p-6">
                <button @click="showCreateModal = true" class="mb-6 px-6 py-3 bg-blue-600 text-white rounded-lg font-bold">+ New Lab</button>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div v-for="lab in labs" :key="lab.id" @click="enterLab(lab)" class="bg-white p-4 rounded-lg shadow cursor-pointer hover:shadow-lg">
                        <h3 class="font-bold text-lg">{{ lab.title }}</h3>
                        <p class="text-sm text-gray-500">{{ lab.ownerId === user.uid ? 'Owner' : 'Member' }}</p>
                    </div>
                </div>
            </div>
            
            <!-- 创建实验室模态框 -->
            <div v-if="showCreateModal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
                <div class="bg-white p-6 rounded-lg w-96">
                    <h2 class="text-xl font-bold mb-4">Create Lab</h2>
                    <input v-model="newLabName" type="text" placeholder="Lab Name" class="w-full p-2 border rounded-lg mb-4">
                    <div class="flex gap-3">
                        <button @click="showCreateModal = false" class="flex-1 px-4 py-2 bg-gray-300 rounded-lg">Cancel</button>
                        <button @click="createLab" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg">Create</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 实验室视图 -->
        <div v-else-if="view === 'lab'" class="h-full flex flex-col">
            <div class="bg-white px-6 py-4 border-b flex justify-between items-center">
                <h1 class="text-xl font-bold">{{ currentLab?.title }}</h1>
                <button @click="exitLab" class="px-4 py-2 bg-red-500 text-white rounded-lg">Exit</button>
            </div>
            <div class="flex-1 flex">
                <!-- 工具栏 -->
                <div class="w-20 bg-gray-100 border-r p-3 flex flex-col gap-3">
                    <button @click="addElement('note')" title="Note" class="p-2 bg-blue-500 text-white rounded-lg"><i class="fa-solid fa-sticky-note"></i></button>
                    <button @click="addElement('timer')" title="Timer" class="p-2 bg-green-500 text-white rounded-lg"><i class="fa-solid fa-stopwatch"></i></button>
                    <button @click="addElement('text')" title="Text" class="p-2 bg-purple-500 text-white rounded-lg"><i class="fa-solid fa-font"></i></button>
                </div>
                <!-- 画布 -->
                <div class="flex-1 overflow-hidden relative bg-gray-50">
                    <div class="w-full h-full select-none" :style="{ transform: `translate(${camera.x}px, ${camera.y}px) scale(${camera.z})` }">
                        <div v-for="el in elements" :key="el.id" :style="{ left: el.x + 'px', top: el.y + 'px', width: el.w + 'px', height: el.h + 'px' }" class="absolute bg-white border rounded-lg shadow p-3 cursor-move">
                            <div class="font-bold text-sm">{{ el.type }}</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
