<!DOCTYPE html>
<html>
<head>
    <title>V-Cloak Test</title>
    <style>
        [v-cloak] { display: none !important; }
        #app { 
            display: none !important;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }
        #app:not([v-cloak]) {
            display: flex !important;
        }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        <h1>Vue App Content - Should show after compilation</h1>
        <p>{{ message }}</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.prod.min.js"></script>
    <script>
        const { createApp, ref } = Vue;
        
        createApp({
            setup() {
                const message = ref('V-Cloak is working correctly!');
                return { message };
            }
        }).mount('#app');

        // Verify fix after mount
        setTimeout(() => {
            const appEl = document.getElementById('app');
            if (appEl) {
                appEl.removeAttribute('v-cloak');
                appEl.style.display = 'flex';
                console.log('✅ V-Cloak fix applied successfully');
            }
        }, 100);
    </script>
</body>
</html>
